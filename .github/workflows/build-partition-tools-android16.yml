name: Build Android 16 partition tools

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  AOSP_TAG: android-16.0.0_r4

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Install repo
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          curl --proto '=https' --tlsv1.2 -fsSL \
            https://storage.googleapis.com/git-repo-downloads/repo \
            -o "$HOME/bin/repo"
          chmod a+rx "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          "$HOME/bin/repo" version

      - name: Download only the required AOSP projects
        run: |
          set -euo pipefail
          mkdir aosp
          cd aosp
          repo init -u https://android.googlesource.com/platform/manifest \
            -b "$AOSP_TAG" --depth=1

          repo sync -c -j4 --no-clone-bundle --no-tags \
            build/blueprint \
            build/make \
            build/release \
            build/soong \
            bionic \
            external/abseil-cpp \
            external/boringssl \
            external/compiler-rt \
            external/e2fsprogs \
            external/fmtlib \
            external/go-cmp \
            external/golang-protobuf \
            external/libcxx \
            external/libcxxabi \
            external/pogreb \
            external/protobuf \
            external/starlark-go \
            external/zlib \
            prebuilts/build-tools \
            prebuilts/clang/host/linux-x86 \
            prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8 \
            prebuilts/gcc/linux-x86/host/x86_64-w64-mingw32-4.8 \
            prebuilts/go/linux-x86 \
            system/core \
            system/extras \
            system/libbase \
            system/logging \
            system/tools/aidl

      - name: Link partition tools statically
        working-directory: aosp
        run: |
          set -euo pipefail

          git -C system/extras apply --unidiff-zero <<'PATCH'
          diff --git a/partition_tools/Android.bp b/partition_tools/Android.bp
          --- a/partition_tools/Android.bp
          +++ b/partition_tools/Android.bp
          @@ -27,0 +28,7 @@
          +    static_libs: [
          +        "libcrypto",
          +        "libcrypto_utils",
          +        "libext4_utils",
          +        "libsparse",
          +        "libz",
          +    ],
          @@ -35 +42 @@
          -cc_library_shared {
          +cc_library {
          @@ -39 +46 @@
          -    shared_libs: [
          +    static_libs: [
          @@ -40,0 +48 @@
          +        "libjsonpbparse",
          @@ -45,3 +52,0 @@
          -    static_libs: [
          -        "libjsonpbparse",
          -    ],
          @@ -70 +75,2 @@
          -    shared_libs: [
          +    static_executable: true,
          +    static_libs: [
          @@ -71,0 +78 @@
          +        "libjsonpbparse",
          @@ -74,3 +81 @@
          -    ],
          -    static_libs: [
          -        "libjsonpbparse",
          +        "libprotobuf-cpp-full",
          @@ -96 +101 @@
          -            shared_libs: [
          +            static_libs: [
          @@ -106 +111,2 @@
          -    shared_libs: [
          +    static_executable: true,
          +    static_libs: [
          @@ -124 +130,2 @@
          -    shared_libs: [
          +    static_executable: true,
          +    static_libs: [
          @@ -139 +146,2 @@
          -    shared_libs: [
          +    static_executable: true,
          +    static_libs: [
          @@ -179 +187,2 @@
          -    shared_libs: [
          +    static_executable: true,
          +    static_libs: [
          PATCH

          git -C system/core apply --unidiff-zero <<'PATCH'
          diff --git a/fs_mgr/liblp/Android.bp b/fs_mgr/liblp/Android.bp
          --- a/fs_mgr/liblp/Android.bp
          +++ b/fs_mgr/liblp/Android.bp
          @@ -51 +51 @@
          -    shared_libs: [
          +    static_libs: [
          diff --git a/libsparse/Android.bp b/libsparse/Android.bp
          --- a/libsparse/Android.bp
          +++ b/libsparse/Android.bp
          @@ -26 +26 @@
          -    shared_libs: [
          +    static_libs: [
          @@ -45,0 +46 @@
          +    static_executable: true,
          @@ -53,0 +55 @@
          +        "liblog",
          @@ -60,0 +63,3 @@
          +        windows: {
          +            enabled: true,
          +        },
          @@ -65,0 +71 @@
          +    static_executable: true,
          @@ -70,0 +77 @@
          +        "liblog",
          @@ -73,0 +81,5 @@
          +    target: {
          +        windows: {
          +            enabled: true,
          +        },
          +    },
          PATCH

      - name: Build only partition_tools
        working-directory: aosp
        run: |
          set -euo pipefail
          mkdir -p out/soong
          printf '%s\n' \
            '{' \
            '  "Allow_missing_dependencies": true,' \
            '  "HostArch": "x86_64",' \
            '  "CrossHost": "windows",' \
            '  "CrossHostArch": "x86_64",' \
            '  "HostMusl": false,' \
            '  "StripByDefault": true' \
            '}' > out/soong/soong.variables

          LINUX=out/host/linux-x86/bin
          WINDOWS=out/host/windows-x86/bin

          build/soong/soong_ui.bash --make-mode \
            --soong-only --skip-config --skip-soong-tests -j2 \
            "$LINUX/lpmake" \
            "$LINUX/lpdump" \
            "$LINUX/lpadd" \
            "$LINUX/lpflash" \
            "$LINUX/lpunpack" \
            "$LINUX/simg2img" \
            "$LINUX/img2simg" \
            "$WINDOWS/lpmake.exe" \
            "$WINDOWS/simg2img.exe" \
            "$WINDOWS/img2simg.exe"

      - name: Test and package
        run: |
          set -euo pipefail
          VERSION="partition-tools-$AOSP_TAG-static"
          WINDOWS_NAME="partition-tools-$AOSP_TAG-windows-x86_64-static"
          LINUX_OUT=aosp/out/host/linux-x86
          WINDOWS_OUT=aosp/out/host/windows-x86
          LINUX_DIR="dist/$VERSION-linux-x86_64"
          WINDOWS_DIR="dist/$WINDOWS_NAME"

          mkdir -p "$LINUX_DIR/bin" "$WINDOWS_DIR"

          for tool in lpmake lpdump lpadd lpflash lpunpack simg2img img2simg; do
            test -x "$LINUX_OUT/bin/$tool"
            cp "$LINUX_OUT/bin/$tool" "$LINUX_DIR/bin/"
            file "$LINUX_DIR/bin/$tool" | grep -q 'statically linked'
            output="$("$LINUX_DIR/bin/$tool" --help 2>&1 || true)"
            grep -qi usage <<<"$output"
          done

          : > "$WINDOWS_DIR/IMPORTS.txt"
          for tool in lpmake simg2img img2simg; do
            test -f "$WINDOWS_OUT/bin/$tool.exe"
            cp "$WINDOWS_OUT/bin/$tool.exe" "$WINDOWS_DIR/"
            file "$WINDOWS_DIR/$tool.exe" | grep -q 'PE32+'
            printf '[%s.exe]\n' "$tool" >> "$WINDOWS_DIR/IMPORTS.txt"
            objdump -p "$WINDOWS_DIR/$tool.exe" \
              | sed -n 's/^[[:space:]]*DLL Name: //p' \
              >> "$WINDOWS_DIR/IMPORTS.txt"
          done
          if grep -Eqi \
            'lib(base|log|lp|protobuf|crypto|ssl|z|c\+\+|winpthread|gcc).*\.dll' \
            "$WINDOWS_DIR/IMPORTS.txt"; then
            echo 'Windows binary still imports a non-system runtime DLL' >&2
            exit 1
          fi

          printf 'Built from AOSP %s\n' "$AOSP_TAG" \
            | tee "$LINUX_DIR/SOURCE.txt" "$WINDOWS_DIR/SOURCE.txt"

          tar -C dist -cJf "dist/$VERSION-linux-x86_64.tar.xz" \
            "$VERSION-linux-x86_64"
          (cd dist && zip -9 -qr "$WINDOWS_NAME.zip" "$WINDOWS_NAME")
          (cd dist && sha256sum ./*.tar.xz ./*.zip > SHA256SUMS)

          cat > dist/RELEASE_NOTES.md <<EOF
          Android 16 partition tools built from AOSP $AOSP_TAG.

          Linux/WSL: static lpmake, lpdump, lpadd, lpflash, lpunpack, simg2img and img2simg.
          Native Windows: lpmake.exe, simg2img.exe and img2simg.exe with static AOSP libraries.
          Windows system DLL imports are listed in IMPORTS.txt.
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: partition-tools-static-${{ env.AOSP_TAG }}
          path: |
            dist/*.tar.xz
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error

      - name: Upload GitHub Release assets
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          assets=(dist/*.tar.xz dist/*.zip dist/SHA256SUMS)
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" --notes-file dist/RELEASE_NOTES.md
          fi
