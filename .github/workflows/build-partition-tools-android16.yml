name: Build Android 16 lpmake for Windows

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  AOSP_TAG: android-16.0.0_r4

jobs:
  build:
    # Must match the exact name of your GitHub-hosted larger runner.
    runs-on: aosp-ubuntu-16core

    timeout-minutes: 360

    steps:
      - name: Configure temporary paths
        shell: bash
        run: |
          set -euo pipefail

          echo "AOSP_ROOT=$RUNNER_TEMP/aosp" >> "$GITHUB_ENV"
          echo "AOSP_OUT=$RUNNER_TEMP/aosp-out" >> "$GITHUB_ENV"

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            git-core \
            gnupg \
            flex \
            bison \
            build-essential \
            zip \
            curl \
            zlib1g-dev \
            libc6-dev-i386 \
            lib32z1-dev \
            libgl1-mesa-dev \
            libxml2-utils \
            xsltproc \
            unzip \
            fontconfig \
            python3 \
            rsync \
            file

          mkdir -p "$HOME/bin"

          curl -fsSL \
            https://storage.googleapis.com/git-repo-downloads/repo \
            -o "$HOME/bin/repo"

          chmod +x "$HOME/bin/repo"

          "$HOME/bin/repo" version

      - name: Sync Android 16 source
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$AOSP_ROOT" "$AOSP_OUT"
          cd "$AOSP_ROOT"

          "$HOME/bin/repo" init \
            -u https://android.googlesource.com/platform/manifest \
            -b "$AOSP_TAG" \
            --partial-clone \
            --clone-filter=blob:limit=10M \
            --no-use-superproject

          "$HOME/bin/repo" sync \
            -c \
            -j8 \
            --no-clone-bundle \
            --prune \
            --fail-fast \
            --retry-fetches=3

      - name: Build only lpmake for Windows
        shell: bash
        run: |
          set -euo pipefail

          cd "$AOSP_ROOT"

          export OUT_DIR="$AOSP_OUT"

          source build/envsetup.sh

          lunch \
            aosp_cf_x86_64_phone-trunk_staging-userdebug

          HOST_CROSS_OS_VALUE="$(get_build_var HOST_CROSS_OS)"

          echo "HOST_CROSS_OS=$HOST_CROSS_OS_VALUE"

          if [[ "$HOST_CROSS_OS_VALUE" != "windows" ]]; then
            echo "::error::Windows cross-compilation is not enabled."
            exit 1
          fi

          # Only lpmake and its required dependencies are compiled.
          m -j"$(nproc)" lpmake

      - name: Package lpmake.exe
        id: package
        shell: bash
        run: |
          set -euo pipefail

          EXE="$(
            find "$AOSP_OUT/host" \
              -type f \
              -path "*/bin/lpmake.exe" \
              -print \
              -quit
          )"

          if [[ -z "$EXE" || ! -f "$EXE" ]]; then
            echo "::error::lpmake.exe was not found."

            find "$AOSP_OUT/host" \
              -type f \
              \( -name "*.exe" -o -name "*.dll" \) \
              -print 2>/dev/null || true

            exit 1
          fi

          PACKAGE="lpmake-${AOSP_TAG}-windows"
          PACKAGE_DIR="$GITHUB_WORKSPACE/dist/$PACKAGE"
          BIN_DIR="$(dirname "$EXE")"

          rm -rf "$GITHUB_WORKSPACE/dist"
          mkdir -p "$PACKAGE_DIR"

          cp "$EXE" "$PACKAGE_DIR/lpmake.exe"

          # Copy DLLs placed beside the executable.
          shopt -s nullglob
          DLLS=("$BIN_DIR"/*.dll)

          if (( ${#DLLS[@]} > 0 )); then
            cp "${DLLS[@]}" "$PACKAGE_DIR/"
          fi

          file "$PACKAGE_DIR/lpmake.exe"

          cd "$GITHUB_WORKSPACE/dist"

          zip -9 -r \
            "$PACKAGE.zip" \
            "$PACKAGE"

          sha256sum \
            "$PACKAGE.zip" \
            > "$PACKAGE.zip.sha256"

          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.package }}
          path: |
            dist/${{ steps.package.outputs.package }}.zip
            dist/${{ steps.package.outputs.package }}.zip.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/${{ steps.package.outputs.package }}.zip
            dist/${{ steps.package.outputs.package }}.zip.sha256