name: Build Android 16 partition tools

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  AOSP_TAG: android-16.0.0_r4

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Install repo
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          curl --proto '=https' --tlsv1.2 -fsSL \
            https://storage.googleapis.com/git-repo-downloads/repo \
            -o "$HOME/bin/repo"
          chmod a+rx "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          "$HOME/bin/repo" version

      - name: Download only the required AOSP projects
        run: |
          set -euo pipefail
          mkdir aosp
          cd aosp
          repo init -u https://android.googlesource.com/platform/manifest \
            -b "$AOSP_TAG" --depth=1

          repo sync -c -j4 --no-clone-bundle --no-tags \
            build/blueprint \
            build/make \
            build/release \
            build/soong \
            bionic \
            external/abseil-cpp \
            external/boringssl \
            external/compiler-rt \
            external/e2fsprogs \
            external/fmtlib \
            external/go-cmp \
            external/golang-protobuf \
            external/libcxx \
            external/libcxxabi \
            external/pogreb \
            external/protobuf \
            external/starlark-go \
            external/zlib \
            prebuilts/build-tools \
            prebuilts/clang/host/linux-x86 \
            prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8 \
            prebuilts/gcc/linux-x86/host/x86_64-w64-mingw32-4.8 \
            prebuilts/go/linux-x86 \
            system/core \
            system/extras \
            system/libbase \
            system/logging \
            system/tools/aidl

      - name: Build only partition_tools
        working-directory: aosp
        run: |
          set -euo pipefail
          mkdir -p out/soong
          printf '%s\n' \
            '{' \
            '  "Allow_missing_dependencies": true,' \
            '  "HostArch": "x86_64",' \
            '  "CrossHost": "windows",' \
            '  "CrossHostArch": "x86_64"' \
            '}' > out/soong/soong.variables

          LINUX=out/soong/host/linux-x86/bin
          WINDOWS=out/soong/host/windows-x86/bin

          build/soong/soong_ui.bash --make-mode \
          --soong-only --skip-config --skip-soong-tests -j2 \
          "$LINUX/lpmake" \
          "$LINUX/lpdump" \
          "$LINUX/lpadd" \
          "$LINUX/lpflash" \
          "$LINUX/lpunpack" \
          "$WINDOWS/lpmake.exe"

      - name: Test and package
        run: |
          set -euo pipefail
          VERSION="partition-tools-$AOSP_TAG"
          WINDOWS_NAME="lpmake-$AOSP_TAG-windows-x86_64"
          LINUX_OUT=aosp/out/soong/host/linux-x86
          WINDOWS_OUT=aosp/out/soong/host/windows-x86
          LINUX_DIR="dist/$VERSION-linux-x86_64"
          WINDOWS_DIR="dist/$WINDOWS_NAME"

          mkdir -p "$LINUX_DIR/bin" "$WINDOWS_DIR"
          cp -a "$LINUX_OUT/lib64" "$LINUX_DIR/"

          for tool in lpmake lpdump lpadd lpflash lpunpack; do
            test -x "$LINUX_OUT/bin/$tool"
            cp "$LINUX_OUT/bin/$tool" "$LINUX_DIR/bin/"
            output="$("$LINUX_DIR/bin/$tool" --help 2>&1 || true)"
            grep -qi usage <<<"$output"
          done

          test -f "$WINDOWS_OUT/bin/lpmake.exe"
          cp "$WINDOWS_OUT/bin/lpmake.exe" "$WINDOWS_DIR/"
          find "$WINDOWS_OUT/bin" -maxdepth 1 -iname '*.dll' \
            -exec cp {} "$WINDOWS_DIR/" \;
          file "$WINDOWS_DIR/lpmake.exe" | grep -q 'PE32+'

          printf 'Built from AOSP %s\n' "$AOSP_TAG" \
            | tee "$LINUX_DIR/SOURCE.txt" "$WINDOWS_DIR/SOURCE.txt"

          tar -C dist -cJf "dist/$VERSION-linux-x86_64.tar.xz" \
            "$VERSION-linux-x86_64"
          (cd dist && zip -9 -qr "$WINDOWS_NAME.zip" "$WINDOWS_NAME")
          (cd dist && sha256sum ./*.tar.xz ./*.zip > SHA256SUMS)

          cat > dist/RELEASE_NOTES.md <<EOF
          Android 16 partition tools built from AOSP $AOSP_TAG.

          Linux/WSL: lpmake, lpdump, lpadd, lpflash and lpunpack.
          Native Windows: lpmake.exe (the only Windows target enabled upstream).
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: partition-tools-${{ env.AOSP_TAG }}
          path: |
            dist/*.tar.xz
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error

      - name: Upload GitHub Release assets
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          assets=(dist/*.tar.xz dist/*.zip dist/SHA256SUMS)
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" --notes-file dist/RELEASE_NOTES.md
          fi
